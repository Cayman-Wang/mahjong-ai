experiment_name: ppo_selfplay_standard_2gpu
seed: 1
run_dir: runs
num_iterations: 20
checkpoint_every: 5

# Increase sampling parallelism so two learner GPUs are less likely to idle
# behind a single local env runner.
rollout_workers: 6
num_envs_per_worker: 2

# RLlib new API stack: true multi-GPU training requires num_learners > 1.
# Keep the driver on CPU and assign one GPU to each remote learner.
num_gpus: 0
num_learners: 2
num_gpus_per_learner: 1
num_cpus_per_learner: 1

# Keep the effective batch per learner close to the single-GPU standard run:
# total train batch 8192 => 4096 per learner when num_learners=2.
train_batch_size: 8192
sgd_minibatch_size: 512
num_sgd_iter: 10
lr: 0.0003
clip_param: 0.2
gamma: 0.99
lambda: 0.95

model:
  hidden_sizes: [512, 512]

warnings:
  quiet_ray_future_warning: false
  quiet_new_api_stack_warning: false
  quiet_ray_deprecation_warning: false

self_play:
  enabled: true
  opponent_pool_size: 4
  snapshot_interval: 5
  main_policy_opponent_prob: 0.2
  seat0_always_main: true

evaluation:
  eval_every: 5
  eval_games: 16
  baselines: [heuristic, random]
  seed_list: []
  output_path: ""
  strict_illegal_action: true
  replay:
    enabled: true
    games_per_eval: 1
    output_dir: ""
    include_omniscient: true
    seat_views: [0]
    max_steps: 5000
